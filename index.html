<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureEarth Organics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #2d5016 0%, #58a368 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }
        
        img {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin-bottom: 30px;
            border-radius: 8px;
        }
        
        h1 {
            font-size: 2.5em;
            color: #2d5016;
            margin-bottom: 15px;
        }
        
        p {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        a {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #2d5016 0%, #58a368 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(45, 80, 22, 0.3);
        }
        
        .secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .secondary:hover {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <img width="500" height="200" alt="PureEarth Organics" src="https://github.com/user-attachments/assets/0aa67016-6eaf-458a-adb2-6e31a0763ed6" />
        
        <h1>PureEarth Organics</h1>
        
        <p>Pure, organic, sustainable products for a healthier you and planet.</p>
        
        <div class="button-group">
            <a href="https://shop.pureearth.com">Shop Now</a>
            <a href="https://github.com/kabishkrishanr/PEO" class="secondary">View on GitHub</a>
        </div>
    </div>
</body>
</html>
